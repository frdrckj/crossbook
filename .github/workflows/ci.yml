name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      # Build against committed query metadata in .sqlx, no database needed.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge fmt --check
      - run: forge test -vvv

  integration:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
      DATABASE_URL: postgres://crossbook:crossbook@localhost:5432/crossbook
      RPC_URL: http://localhost:8545
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crossbook
          POSTGRES_PASSWORD: crossbook
          POSTGRES_DB: crossbook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crossbook"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build
        working-directory: contracts
      - name: run db and e2e tests against live services
        run: |
          anvil --silent --chain-id 31337 &
          sleep 3
          cargo test -p crossbook-engine --features e2e --test db --test e2e
