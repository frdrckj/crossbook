[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
# Pinned for reproducible bytecode and so contract <-> Anvil node EVM versions agree.
solc = "0.8.28"
evm_version = "cancun"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 32
